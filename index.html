<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Wibu Tower Defense</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0d0f14;
        overflow: hidden;
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* DOM splash — visible before Phaser canvas exists */
      #loading-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0d0f14;
        z-index: 9999;
        pointer-events: none;
        gap: 14px;
      }
      #loading-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: #f0c060;
        text-transform: uppercase;
      }
      .loading-track {
        width: 320px;
        height: 10px;
        background: #1e2030;
        border-radius: 5px;
        overflow: hidden;
      }
      #loading-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #b07820, #f0c060);
        border-radius: 5px;
        transition: width 80ms linear;
      }
      #loading-label {
        font-size: 12px;
        color: #6a6880;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <!-- Splash is pure HTML/CSS — visible before any JS runs -->
    <div id="loading-splash">
      <div id="loading-title">Wibu Tower Defense</div>
      <div class="loading-track">
        <div id="loading-bar-fill"></div>
      </div>
      <div id="loading-label">Loading…</div>
    </div>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
