<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Wibu Tower Defense</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0d0f14;
        overflow: hidden;
        /* Size to the VISIBLE viewport. Static `vh` equals the LAYOUT viewport,
           which on mobile is taller than the visual one while the toolbar shows,
           so the bottom of the FIT-scaled canvas (BATTLE CTA / build bar) hides
           behind browser chrome — untappable, and unscrollable under
           `touch-action: none`. `dvh` tracks the visible area; `vh`/100% stay
           first as the universal fallback. */
        height: 100%;
        height: 100dvh;
        font-family: system-ui, sans-serif;
        /* The game canvas owns all touch gestures — no native scroll/pinch/
           double-tap-zoom or pull-to-refresh bounce underneath it. */
        touch-action: none;
        overscroll-behavior: none;
      }
      #game {
        width: 100vw;
        width: 100dvw;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game,
      #game canvas {
        touch-action: none;
        overscroll-behavior: none;
      }
      /* Pre-`dvh` iOS Safari (< 15.4): `-webkit-fill-available` approximates the
         visible-viewport height the same way. */
      @supports (-webkit-touch-callout: none) {
        html,
        body,
        #game {
          height: -webkit-fill-available;
        }
      }
      /* DOM splash — visible before Phaser canvas exists */
      #loading-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0d0f14;
        z-index: 9999;
        pointer-events: none;
        gap: 14px;
      }
      #loading-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: #f0c060;
        text-transform: uppercase;
      }
      .loading-track {
        width: 320px;
        height: 10px;
        background: #1e2030;
        border-radius: 5px;
        overflow: hidden;
      }
      #loading-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #b07820, #f0c060);
        border-radius: 5px;
        transition: width 80ms linear;
      }
      #loading-label {
        font-size: 12px;
        color: #6a6880;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <!-- Splash is pure HTML/CSS — visible before any JS runs -->
    <div id="loading-splash">
      <div id="loading-title">Wibu Tower Defense</div>
      <div class="loading-track">
        <div id="loading-bar-fill"></div>
      </div>
      <div id="loading-label">Loading…</div>
    </div>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
