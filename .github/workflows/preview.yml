name: Preview deploy (PR)

on:
  pull_request:
    branches: [main]

concurrency:
  group: firebase-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    # Secrets are unavailable to PRs opened from forks; skip those.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Tests
        run: npm test

      # Deploy to a 7-day preview channel; the action posts/updates the
      # preview URL as a PR comment automatically. Auth via the same GCP
      # service-account secret as the live deploy (see deploy.yml).
      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WIBU_TOWER_DEFENSE_D8B1C }}
          projectId: wibu-tower-defense-d8b1c
          expires: 7d
