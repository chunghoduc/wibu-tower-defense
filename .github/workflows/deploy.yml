name: Deploy to Firebase Hosting (live)

on:
  push:
    branches: [main]

# Cancel an in-progress live deploy if a newer push arrives.
concurrency:
  group: firebase-live
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Tests
        run: npm test

      # Auth via a GCP service-account key (the supported path; the old
      # --token / FIREBASE_TOKEN flow is deprecated and being removed).
      # Provision once with `firebase init hosting:github`, which creates the
      # service account and stores its key as the secret below.
      - name: Deploy to live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WIBU_TOWER_DEFENSE_D8B1C }}
          projectId: wibu-tower-defense-d8b1c
          channelId: live
