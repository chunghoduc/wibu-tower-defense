<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9aa0a8"/><stop offset="100%" stop-color="#404850"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bg)" rx="8"/>
  <!-- horizontal rock stratification -->
  <g fill="#5e666e" opacity="0.6">
    <rect x="0" y="20" width="128" height="8" rx="2"/>
    <rect x="0" y="38" width="128" height="6" rx="2"/>
    <rect x="0" y="55" width="128" height="9" rx="2"/>
    <rect x="0" y="74" width="128" height="7" rx="2"/>
    <rect x="0" y="92" width="128" height="8" rx="2"/>
    <rect x="0" y="110" width="128" height="6" rx="2"/>
  </g>
  <!-- striation break lines (cliff face) -->
  <g stroke="#303840" stroke-width="1" opacity="0.45">
    <path d="M15 20 L20 38 L12 55 L18 74 L8 92 L14 110"/>
    <path d="M50 20 L48 38 L55 55 L45 74 L52 92 L48 110"/>
    <path d="M85 20 L90 38 L82 55 L88 74 L80 92 L86 110"/>
    <path d="M112 20 L115 38 L110 55 L116 74 L108 92 L114 110"/>
  </g>
  <!-- rock face highlights -->
  <g fill="#b8c0c8" opacity="0.3">
    <rect x="0" y="18" width="128" height="3"/>
    <rect x="0" y="36" width="128" height="2"/>
    <rect x="0" y="53" width="128" height="3"/>
    <rect x="0" y="72" width="128" height="2"/>
  </g>
  <!-- moss in crevices -->
  <g fill="#4a6a3a" opacity="0.35">
    <ellipse cx="35" cy="29" rx="8" ry="2.5"/>
    <ellipse cx="70" cy="47" rx="10" ry="2.5"/>
    <ellipse cx="105" cy="64" rx="7" ry="2.5"/>
    <ellipse cx="25" cy="83" rx="9" ry="2.5"/>
    <ellipse cx="85" cy="101" rx="8" ry="2.5"/>
  </g>
</svg>
