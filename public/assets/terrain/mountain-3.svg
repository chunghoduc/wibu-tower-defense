<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="ice" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#d0e4f0"/><stop offset="100%" stop-color="#5a7888"/>
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.18"/><stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="64" cy="104" rx="50" ry="12" fill="url(#shadow)"/>
  <!-- snowy twin peaks -->
  <path d="M44 38 L72 100 L16 100 Z" fill="url(#ice)"/>
  <path d="M82 30 L112 100 L56 100 Z" fill="#aac4d4"/>
  <!-- snow caps -->
  <path d="M44 38 L34 60 L54 60 Z" fill="#ffffff"/>
  <path d="M82 30 L72 54 L92 54 Z" fill="#ffffff"/>
  <!-- ice shading -->
  <path d="M82 30 L112 100 L82 100 Z" fill="#3a5868" opacity="0.2"/>
  <!-- crevasse lines -->
  <g stroke="#3a5868" stroke-width="1" fill="none" opacity="0.45">
    <path d="M44 44 L38 68 L44 92"/><path d="M82 38 L76 64 L82 92"/>
    <path d="M62 70 L58 86"/>
  </g>
  <!-- icy blue glints -->
  <g fill="#e8f4fc" opacity="0.6">
    <ellipse cx="40" cy="58" rx="6" ry="2.5"/>
    <ellipse cx="80" cy="52" rx="7" ry="3"/>
    <ellipse cx="58" cy="80" rx="5" ry="2"/>
  </g>
  <!-- snow crystals -->
  <g stroke="#fff" stroke-width="0.9" opacity="0.7">
    <path d="M44 40 v5 M41.5 41.5 l5 2 M41.5 43.5 l5 -2"/>
    <path d="M82 32 v5 M79.5 33.5 l5 2 M79.5 35.5 l5 -2"/>
  </g>
</svg>
