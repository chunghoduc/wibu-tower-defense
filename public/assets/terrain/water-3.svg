<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3aacde"/><stop offset="100%" stop-color="#0d5888"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bg)" rx="8"/>
  <!-- shallow floor visible through water -->
  <g opacity="0.3" fill="#2870a8">
    <ellipse cx="30" cy="85" rx="18" ry="10"/><ellipse cx="90" cy="70" rx="15" ry="8"/>
    <ellipse cx="55" cy="110" rx="20" ry="9"/><ellipse cx="108" cy="100" rx="12" ry="7"/>
  </g>
  <!-- gentle ripples -->
  <g stroke="#7ad8f8" stroke-width="1.2" fill="none" opacity="0.45">
    <path d="M5 35 Q25 30 45 35 Q65 40 85 35 Q105 30 125 35"/>
    <path d="M5 50 Q25 45 45 50 Q65 55 85 50 Q105 45 125 50"/>
    <path d="M5 65 Q25 60 45 65 Q65 70 85 65 Q105 60 125 65"/>
    <path d="M5 80 Q25 75 45 80 Q65 85 85 80 Q105 75 125 80"/>
    <path d="M5 95 Q25 90 45 95 Q65 100 85 95 Q105 90 125 95"/>
  </g>
  <!-- caustic light patterns -->
  <g fill="#a0e8ff" opacity="0.35">
    <ellipse cx="25" cy="45" rx="6" ry="3" transform="rotate(-15 25 45)"/>
    <ellipse cx="75" cy="55" rx="8" ry="3" transform="rotate(10 75 55)"/>
    <ellipse cx="110" cy="40" rx="5" ry="2.5" transform="rotate(-5 110 40)"/>
    <ellipse cx="50" cy="75" rx="7" ry="3" transform="rotate(20 50 75)"/>
  </g>
  <!-- bright reflection at top -->
  <path d="M20 15 Q64 8 108 15 Q64 22 20 15Z" fill="#d0f4ff" opacity="0.5"/>
</svg>
